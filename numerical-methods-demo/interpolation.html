<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cubic Spline Interpolation — Fabio Nicotra</title>
        <link rel="stylesheet" href="../css/style.css" />
        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
        <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    </head>
    <body>
        <nav class="topnav">
            <a class="brand" href="../index.html">Fabio Nicotra</a>
            <div class="topnav-links">
                <a href="../index.html#about">About</a>
                <a href="../index.html#work">Work</a>
                <a href="../index.html#skills">Skills</a>
                <a href="../index.html#contact">Contact</a>
            </div>
        </nav>

        <main>
            <section class="page-hero">
                <a href="../numerical-methods.html" class="section-back"
                    >← Numerical Methods</a
                >
                <p class="eyebrow reveal">Interactive Demo</p>
                <h1 class="reveal">Cubic Spline Interpolation</h1>
                <p class="hero-sub reveal">
                    Enter a set of data points, fit a smooth curve through
                    them via cubic splines.
                </p>
            </section>

            <section class="content">
                <div id="loading" class="glass-card tool-loading reveal">
                    <div class="spinner"></div>
                    <p>Loading…</p>
                </div>

                <div id="app" class="tool-grid reveal" style="display: none">
                    <div class="glass-card">
                        <h2>Data Points</h2>
                        <table class="data-table" id="dataTable">
                            <thead>
                                <tr>
                                    <th>X</th>
                                    <th>Y</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                            <tfoot>
                                <tr>
                                    <td colspan="2"></td>
                                    <td>
                                        <button
                                            class="row-action row-action--add"
                                            type="button"
                                            aria-label="Add row"
                                            title="Add row"
                                            onclick="addRow()"
                                        >
                                            +
                                        </button>
                                    </td>
                                </tr>
                            </tfoot>
                        </table>
                        <div
                            id="status"
                            class="tool-status"
                            style="display: none"
                        ></div>
                    </div>

                    <div class="glass-card chart-card">
                        <div id="plot"></div>
                    </div>
                </div>
            </section>

            <footer class="site-footer">
                <p>
                    &copy; <span id="year"></span> Fabio Nicotra. All rights
                    reserved.
                </p>
            </footer>
        </main>

        <script src="../js/main.js"></script>
        <script>
            let pyodide;
            const defaultData = [
                { x: 0, y: 1 },
                { x: 1, y: 2.5 },
                { x: 2, y: 2 },
                { x: 4, y: 3.5 },
                { x: 6, y: 3 },
                { x: 10, y: 4.5 },
            ];

            function getChartTheme() {
                const computed = getComputedStyle(document.documentElement);
                const token = (name) => computed.getPropertyValue(name).trim();
                return {
                    font: token("--fg"),
                    grid: token("--grid"),
                    marker: token("--accent-2"),
                    curve: token("--accent-1"),
                };
            }

            async function initializePyodide() {
                pyodide = await loadPyodide();
                await pyodide.loadPackage([
                    "micropip",
                    "numpy",
                    "matplotlib",
                    "pandas",
                ]);

                await pyodide.runPythonAsync(`
            import micropip
            await micropip.install('numanlib')
        `);

                await pyodide.runPythonAsync(`
            import numpy as np
            from numanlib.interpolation import CubicSpline
            import json

            current_spline = None

            def fit_spline(x_values, y_values):
                global current_spline
                try:
                    x = np.array(x_values, dtype=np.float64)
                    y = np.array(y_values, dtype=np.float64)

                    if len(x) < 3:
                        return {'success': False, 'error': 'Need at least 3 points for cubic spline'}

                    if len(np.unique(x)) != len(x):
                        return {'success': False, 'error': 'X values must be distinct'}

                    # Sort by x
                    sort_idx = np.argsort(x)
                    x = x[sort_idx]
                    y = y[sort_idx]

                    spline = CubicSpline(x, y)
                    current_spline = spline.interpolate()
                    return {
                        'success': True,
                        'min_x': float(x.min()),
                        'max_x': float(x.max())
                    }
                except Exception as e:
                    return {'success': False, 'error': str(e)}

            def interpolate_curve():
                if current_spline is None:
                    return {'error': 'No spline fitted'}

                min_x = current_spline.x.min()
                max_x = current_spline.x.max()
                span = max_x - min_x
                dense_x = np.linspace(min_x, max_x, 400) if span > 0 else np.array([min_x])
                interpolated_y = current_spline(dense_x)

                return {
                    'success': True,
                    'dense_x': dense_x.tolist(),
                    'interpolated_y': interpolated_y.tolist(),
                    'min_x': float(min_x),
                    'max_x': float(max_x)
                }

        `);

                document.getElementById("loading").style.display = "none";
                document.getElementById("app").style.display = "grid";

                initializeTable();
                await updatePlot();

                window
                    .matchMedia("(prefers-color-scheme: dark)")
                    .addEventListener("change", () => {
                        updatePlot();
                    });
            }

            function initializeTable() {
                const body = document.getElementById("tableBody");
                body.innerHTML = "";
                defaultData.forEach((row) => {
                    addRowToTable(row.x, row.y);
                });
            }

            function addRowToTable(x, y) {
                const body = document.getElementById("tableBody");
                const row = document.createElement("tr");
                row.className = "row-enter";
                row.innerHTML = `
            <td><input type="number" class="x-input" value="${x}" step="0.01"></td>
            <td><input type="number" class="y-input" value="${y}" step="0.01"></td>
            <td>
                <button class="row-action row-action--remove" type="button" aria-label="Delete row" title="Delete row" onclick="removeRow(this.closest('tr'))">−</button>
            </td>
        `;
                body.appendChild(row);

                row.querySelector(".x-input").addEventListener(
                    "change",
                    updatePlot,
                );
                row.querySelector(".y-input").addEventListener(
                    "change",
                    updatePlot,
                );

                // Double rAF: let the browser paint the "row-enter" state
                // first, then remove it so the transition actually plays.
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        row.classList.remove("row-enter");
                    });
                });
            }

            function addRow() {
                addRowToTable(5, 3);
                updatePlot();
            }

            function removeRow(row) {
                row.classList.add("row-leave");
                row.addEventListener("transitionend", () => row.remove(), {
                    once: true,
                });
                updatePlot();
            }

            async function updatePlot() {
                if (!pyodide) return;

                const rows = document.querySelectorAll(
                    "#tableBody tr:not(.row-leave)",
                );
                const xValues = [];
                const yValues = [];

                rows.forEach((row) => {
                    const x = parseFloat(
                        row.querySelector(".x-input").value,
                    );
                    const y = parseFloat(
                        row.querySelector(".y-input").value,
                    );
                    if (!isNaN(x) && !isNaN(y)) {
                        xValues.push(x);
                        yValues.push(y);
                    }
                });

                const statusEl = document.getElementById("status");

                if (xValues.length < 3) {
                    statusEl.textContent =
                        "Need at least 3 data points for cubic spline";
                    statusEl.classList.add("error");
                    statusEl.style.display = "block";
                    return;
                }

                const fitResult = await pyodide.runPythonAsync(`
            import json
            json.dumps(fit_spline(${JSON.stringify(xValues)}, ${JSON.stringify(yValues)}))
        `);

                const fit = JSON.parse(fitResult);

                if (!fit.success) {
                    statusEl.textContent = fit.error;
                    statusEl.classList.add("error");
                    statusEl.style.display = "block";
                    return;
                }

                statusEl.textContent = `Fitted on ${xValues.length} points`;
                statusEl.classList.remove("error");
                statusEl.style.display = "block";

                const curveResult = await pyodide.runPythonAsync(`
            import json
            json.dumps(interpolate_curve())
        `);

                const curve = JSON.parse(curveResult);
                const theme = getChartTheme();

                const dataTrace = {
                    x: xValues,
                    y: yValues,
                    mode: "markers",
                    name: "Input Data",
                    marker: { size: 9, color: theme.marker },
                    hovertemplate:
                        "<b>x = %{x:.2f}</b><br>y = %{y:.2f}<extra></extra>",
                };

                const curveTrace = {
                    x: curve.dense_x,
                    y: curve.interpolated_y,
                    mode: "lines",
                    name: "Cubic Spline",
                    line: { color: theme.curve, width: 3 },
                    hovertemplate:
                        "<b>x = %{x:.2f}</b><br>y = %{y:.2f}<extra></extra>",
                };

                Plotly.newPlot(
                    "plot",
                    [dataTrace, curveTrace],
                    {
                        title: {
                            text: "Interpolated Curve",
                            font: { color: theme.font },
                        },
                        xaxis: {
                            title: "X",
                            gridcolor: theme.grid,
                            color: theme.font,
                            zerolinecolor: theme.grid,
                        },
                        yaxis: {
                            title: "Y",
                            gridcolor: theme.grid,
                            color: theme.font,
                            zerolinecolor: theme.grid,
                        },
                        hovermode: "closest",
                        plot_bgcolor: "transparent",
                        paper_bgcolor: "transparent",
                        font: { color: theme.font },
                        legend: { font: { color: theme.font } },
                        margin: { l: 60, r: 30, t: 50, b: 50 },
                    },
                    { responsive: true },
                );
            }

            initializePyodide().catch((err) => {
                document.getElementById("loading").innerHTML =
                    `<p style="color: var(--danger);">Error: ${err.message}</p>`;
            });
        </script>
    </body>
</html>
