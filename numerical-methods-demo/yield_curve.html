<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Yield Curve Interpolation — Fabio Nicotra</title>
        <link rel="stylesheet" href="../css/style.css" />
        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
        <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    </head>
    <body>
        <div class="progress-bar" id="progressBar"></div>

        <div class="blob blob-a"></div>
        <div class="blob blob-b"></div>
        <div class="blob blob-c"></div>

        <nav class="topnav">
            <span class="brand">Fabio Nicotra</span>
            <div class="topnav-links">
                <a href="../index.html#about">About</a>
                <a href="../index.html#work">Work</a>
                <a href="../index.html#skills">Skills</a>
                <a href="../index.html#contact">Contact</a>
            </div>
        </nav>

        <main>
            <section class="page-hero">
                <a href="../numerical-methods.html" class="section-back"
                    >← Numerical Methods</a
                >
                <p class="eyebrow reveal">Interactive Demo</p>
                <h1 class="reveal">Yield Curve Interpolation</h1>
                <p class="hero-sub reveal">
                    Enter bond yields at different maturities, fit a smooth
                    curve via cubic splines.
                </p>
            </section>

            <section class="content">
                <div id="loading" class="glass-card tool-loading reveal">
                    <div class="spinner"></div>
                    <p>Loading…</p>
                </div>

                <div id="app" class="tool-grid reveal" style="display: none">
                    <div class="glass-card">
                        <h2>Market Data</h2>
                        <table class="data-table" id="dataTable">
                            <thead>
                                <tr>
                                    <th>Maturity (yrs)</th>
                                    <th>Yield (%)</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                        <div class="tool-add-row">
                            <button
                                class="btn btn-small"
                                onclick="addRow()"
                                type="button"
                            >
                                + Add Row
                            </button>
                        </div>
                        <div
                            id="status"
                            class="tool-status"
                            style="display: none"
                        ></div>
                    </div>

                    <div class="glass-card chart-card">
                        <div id="plot"></div>
                    </div>
                </div>
            </section>

            <footer class="site-footer">
                <p>
                    &copy; <span id="year"></span> Fabio Nicotra. All rights
                    reserved.
                </p>
            </footer>
        </main>

        <script src="../js/main.js"></script>
        <script>
            let pyodide;
            const defaultData = [
                { maturity: 0.25, yield: 4.5 },
                { maturity: 0.5, yield: 4.6 },
                { maturity: 1, yield: 4.7 },
                { maturity: 2, yield: 4.85 },
                { maturity: 5, yield: 5.0 },
                { maturity: 10, yield: 5.1 },
            ];

            function getChartTheme() {
                const computed = getComputedStyle(document.documentElement);
                const token = (name) => computed.getPropertyValue(name).trim();
                return {
                    font: token("--fg"),
                    grid: token("--grid"),
                    marker: token("--accent-2"),
                    curve: token("--accent-1"),
                    extrapolation: token("--warning"),
                };
            }

            async function initializePyodide() {
                pyodide = await loadPyodide();
                await pyodide.loadPackage([
                    "micropip",
                    "numpy",
                    "matplotlib",
                    "pandas",
                ]);

                await pyodide.runPythonAsync(`
            import micropip
            await micropip.install('numanlib')
        `);

                await pyodide.runPythonAsync(`
            import numpy as np
            from numanlib.interpolation import CubicSpline
            import json

            current_spline = None

            def fit_spline(maturities, yields):
                global current_spline
                try:
                    x = np.array(maturities, dtype=np.float64)
                    y = np.array(yields, dtype=np.float64)

                    if len(x) < 3:
                        return {'success': False, 'error': 'Need at least 3 points for cubic spline'}

                    if len(np.unique(x)) != len(x):
                        return {'success': False, 'error': 'Maturities must be distinct'}

                    # Sort by maturity
                    sort_idx = np.argsort(x)
                    x = x[sort_idx]
                    y = y[sort_idx]

                    spline = CubicSpline(x, y)
                    current_spline = spline.interpolate()
                    return {
                        'success': True,
                        'min_maturity': float(x.min()),
                        'max_maturity': float(x.max())
                    }
                except Exception as e:
                    return {'success': False, 'error': str(e)}

            def interpolate_curve():
                if current_spline is None:
                    return {'error': 'No spline fitted'}

                min_mat = current_spline.x.min()
                max_mat = current_spline.x.max()
                dense_maturities = np.arange(min_mat, max_mat + 0.05, 0.05)
                interpolated_yields = current_spline(dense_maturities)

                return {
                    'success': True,
                    'dense_maturities': dense_maturities.tolist(),
                    'interpolated_yields': interpolated_yields.tolist(),
                    'min_maturity': float(min_mat),
                    'max_maturity': float(max_mat)
                }

        `);

                document.getElementById("loading").style.display = "none";
                document.getElementById("app").style.display = "grid";

                initializeTable();
                await updatePlot();

                window
                    .matchMedia("(prefers-color-scheme: dark)")
                    .addEventListener("change", () => {
                        updatePlot();
                    });
            }

            function initializeTable() {
                const body = document.getElementById("tableBody");
                body.innerHTML = "";
                defaultData.forEach((row) => {
                    addRowToTable(row.maturity, row.yield);
                });
            }

            function addRowToTable(maturity, yieldVal) {
                const body = document.getElementById("tableBody");
                const row = document.createElement("tr");
                row.innerHTML = `
            <td><input type="number" class="maturity-input" value="${maturity}" step="0.01" min="0.01"></td>
            <td><input type="number" class="yield-input" value="${yieldVal}" step="0.01"></td>
            <td><button class="btn btn-small btn-danger" type="button" onclick="this.closest('tr').remove(); updatePlot()">Delete</button></td>
        `;
                body.appendChild(row);

                row.querySelector(".maturity-input").addEventListener(
                    "change",
                    updatePlot,
                );
                row.querySelector(".yield-input").addEventListener(
                    "change",
                    updatePlot,
                );
            }

            function addRow() {
                addRowToTable(0.5, 5.0);
                updatePlot();
            }

            async function updatePlot() {
                if (!pyodide) return;

                const rows = document.querySelectorAll("#tableBody tr");
                const maturities = [];
                const yields = [];

                rows.forEach((row) => {
                    const m = parseFloat(
                        row.querySelector(".maturity-input").value,
                    );
                    const y = parseFloat(
                        row.querySelector(".yield-input").value,
                    );
                    if (!isNaN(m) && !isNaN(y)) {
                        maturities.push(m);
                        yields.push(y);
                    }
                });

                const statusEl = document.getElementById("status");

                if (maturities.length < 3) {
                    statusEl.textContent =
                        "Need at least 3 data points for cubic spline";
                    statusEl.classList.add("error");
                    statusEl.style.display = "block";
                    return;
                }

                const fitResult = await pyodide.runPythonAsync(`
            import json
            json.dumps(fit_spline(${JSON.stringify(maturities)}, ${JSON.stringify(yields)}))
        `);

                const fit = JSON.parse(fitResult);

                if (!fit.success) {
                    statusEl.textContent = fit.error;
                    statusEl.classList.add("error");
                    statusEl.style.display = "block";
                    return;
                }

                statusEl.textContent = `Fitted on ${maturities.length} points`;
                statusEl.classList.remove("error");
                statusEl.style.display = "block";

                const curveResult = await pyodide.runPythonAsync(`
            import json
            json.dumps(interpolate_curve())
        `);

                const curve = JSON.parse(curveResult);
                const theme = getChartTheme();

                const dataTrace = {
                    x: maturities,
                    y: yields,
                    mode: "markers",
                    name: "Input Data",
                    marker: { size: 9, color: theme.marker },
                    hovertemplate:
                        "<b>%{x:.2f} years</b><br>Yield: %{y:.2f}%<extra></extra>",
                };

                const safeIndices = curve.dense_maturities
                    .map((t, i) =>
                        t >= curve.min_maturity && t <= curve.max_maturity
                            ? i
                            : null,
                    )
                    .filter((i) => i !== null);

                const curveTrace = {
                    x: safeIndices.map((i) => curve.dense_maturities[i]),
                    y: safeIndices.map((i) => curve.interpolated_yields[i]),
                    mode: "lines",
                    name: "Cubic Spline",
                    line: { color: theme.curve, width: 3 },
                    hovertemplate:
                        "<b>%{x:.2f} years</b><br>Yield: %{y:.2f}%<extra></extra>",
                };

                const extrapolIndices = curve.dense_maturities
                    .map((t, i) =>
                        t < curve.min_maturity || t > curve.max_maturity
                            ? i
                            : null,
                    )
                    .filter((i) => i !== null);

                let traces = [dataTrace, curveTrace];

                if (extrapolIndices.length > 0) {
                    traces.push({
                        x: extrapolIndices.map(
                            (i) => curve.dense_maturities[i],
                        ),
                        y: extrapolIndices.map(
                            (i) => curve.interpolated_yields[i],
                        ),
                        mode: "lines",
                        name: "Extrapolation",
                        line: {
                            color: theme.extrapolation,
                            width: 3,
                            dash: "dash",
                        },
                        hovertemplate:
                            "<b>%{x:.2f} years</b><br>Yield: %{y:.2f}% (extrapolated)<extra></extra>",
                    });
                }

                Plotly.newPlot(
                    "plot",
                    traces,
                    {
                        title: {
                            text: "Yield Curve",
                            font: { color: theme.font },
                        },
                        xaxis: {
                            title: "Maturity (years)",
                            gridcolor: theme.grid,
                            color: theme.font,
                            zerolinecolor: theme.grid,
                        },
                        yaxis: {
                            title: "Yield (%)",
                            gridcolor: theme.grid,
                            color: theme.font,
                            zerolinecolor: theme.grid,
                        },
                        hovermode: "closest",
                        plot_bgcolor: "transparent",
                        paper_bgcolor: "transparent",
                        font: { color: theme.font },
                        legend: { font: { color: theme.font } },
                        margin: { l: 60, r: 30, t: 50, b: 50 },
                    },
                    { responsive: true },
                );
            }

            initializePyodide().catch((err) => {
                document.getElementById("loading").innerHTML =
                    `<p style="color: var(--danger);">Error: ${err.message}</p>`;
            });
        </script>
    </body>
</html>
