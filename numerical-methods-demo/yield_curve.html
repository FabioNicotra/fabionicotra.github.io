<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yield Curve Interpolation</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            background: #1a2641;
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .table-section h2 {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        th {
            background: #2d3e50;
            padding: 16px 14px;
            text-align: left;
            font-weight: 600;
            color: white;
            font-size: 0.95em;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }

        tr:hover {
            background: #ecf0f1;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #eee;
        }

        td:last-child {
            text-align: center;
            width: 80px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            transition: all 0.2s;
            background: white;
            font-family: inherit;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            background: white;
        }

        input[type="number"]:hover {
            border-color: #a8d8ea;
        }

        .btn {
            padding: 8px 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2980b9;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .add-row {
            margin-top: 15px;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            background: #d5f4e6;
            border-left: 4px solid #27ae60;
            border-radius: 4px;
            font-size: 0.9em;
            color: #145a32;
        }

        .error-status {
            background: #fadbd8;
            border-left-color: #e74c3c;
            color: #78281f;
        }

        #plot {
            width: 100%;
            height: 500px;
            border-radius: 8px;
            overflow: hidden;
        }


        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Yield Curve Interpolation</h1>
            <p>Enter bond yields at different maturities, fit a smooth curve via cubic splines</p>
        </div>

        <div class="content">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading Pyodide and numanlib...</p>
            </div>

            <div id="app" style="display: none;">
                <div class="main-grid">
                    <!-- Left: Input table -->
                    <div class="table-section">
                        <h2>Market Data</h2>
                        <table id="dataTable">
                            <thead>
                                <tr>
                                    <th>Maturity (years)</th>
                                    <th>Yield (%)</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                            </tbody>
                        </table>
                        <div class="add-row">
                            <button class="btn" onclick="addRow()">+ Add Row</button>
                        </div>
                        <div id="status" class="status" style="display: none;"></div>
                    </div>

                    <!-- Right: Chart -->
                    <div>
                        <div id="plot"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let pyodide;
        const defaultData = [
            { maturity: 0.25, yield: 4.5 },
            { maturity: 0.5, yield: 4.6 },
            { maturity: 1, yield: 4.7 },
            { maturity: 2, yield: 4.85 },
            { maturity: 5, yield: 5.0 },
            { maturity: 10, yield: 5.1 }
        ];

        async function initializePyodide() {
            pyodide = await loadPyodide();
            await pyodide.loadPackage(['micropip', 'numpy', 'matplotlib', 'pandas']);

            await pyodide.runPythonAsync(`
                import micropip
                await micropip.install('./numanlib-0.1.0-py3-none-any.whl')
            `);

            await pyodide.runPythonAsync(`
                import numpy as np
                from numanlib.interpolation import CubicSpline
                import json

                current_spline = None

                def fit_spline(maturities, yields):
                    global current_spline
                    try:
                        x = np.array(maturities, dtype=np.float64)
                        y = np.array(yields, dtype=np.float64)

                        if len(x) < 3:
                            return {'success': False, 'error': 'Need at least 3 points for cubic spline'}

                        if len(np.unique(x)) != len(x):
                            return {'success': False, 'error': 'Maturities must be distinct'}

                        # Sort by maturity
                        sort_idx = np.argsort(x)
                        x = x[sort_idx]
                        y = y[sort_idx]

                        spline = CubicSpline(x, y)
                        current_spline = spline.interpolate()
                        return {
                            'success': True,
                            'min_maturity': float(x.min()),
                            'max_maturity': float(x.max())
                        }
                    except Exception as e:
                        return {'success': False, 'error': str(e)}

                def interpolate_curve():
                    if current_spline is None:
                        return {'error': 'No spline fitted'}

                    min_mat = current_spline.x.min()
                    max_mat = current_spline.x.max()
                    dense_maturities = np.arange(min_mat, max_mat + 0.05, 0.05)
                    interpolated_yields = current_spline(dense_maturities)

                    return {
                        'success': True,
                        'dense_maturities': dense_maturities.tolist(),
                        'interpolated_yields': interpolated_yields.tolist(),
                        'min_maturity': float(min_mat),
                        'max_maturity': float(max_mat)
                    }

            `);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            initializeTable();
            await updatePlot();
        }

        function initializeTable() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            defaultData.forEach((row, idx) => {
                addRowToTable(row.maturity, row.yield);
            });
        }

        function addRowToTable(maturity, yieldVal) {
            const body = document.getElementById('tableBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="number" class="maturity-input" value="${maturity}" step="0.01" min="0.01"></td>
                <td><input type="number" class="yield-input" value="${yieldVal}" step="0.01"></td>
                <td><button class="btn btn-small btn-danger" onclick="this.closest('tr').remove(); updatePlot()">Delete</button></td>
            `;
            body.appendChild(row);

            row.querySelector('.maturity-input').addEventListener('change', updatePlot);
            row.querySelector('.yield-input').addEventListener('change', updatePlot);
        }

        function addRow() {
            addRowToTable(0.5, 5.0);
            updatePlot();
        }

        async function updatePlot() {
            const rows = document.querySelectorAll('#tableBody tr');
            const maturities = [];
            const yields = [];

            rows.forEach(row => {
                const m = parseFloat(row.querySelector('.maturity-input').value);
                const y = parseFloat(row.querySelector('.yield-input').value);
                if (!isNaN(m) && !isNaN(y)) {
                    maturities.push(m);
                    yields.push(y);
                }
            });

            if (maturities.length < 3) {
                document.getElementById('status').innerHTML = 'Need at least 3 data points for cubic spline';
                document.getElementById('status').classList.add('error-status');
                document.getElementById('status').style.display = 'block';
                return;
            }

            const fitResult = await pyodide.runPythonAsync(`
                import json
                json.dumps(fit_spline(${JSON.stringify(maturities)}, ${JSON.stringify(yields)}))
            `);

            const fit = JSON.parse(fitResult);

            if (!fit.success) {
                document.getElementById('status').innerHTML = fit.error;
                document.getElementById('status').classList.add('error-status');
                document.getElementById('status').style.display = 'block';
                return;
            }

            document.getElementById('status').innerHTML = `✓ Fitted on ${maturities.length} points`;
            document.getElementById('status').classList.remove('error-status');
            document.getElementById('status').style.display = 'block';

            const curveResult = await pyodide.runPythonAsync(`
                import json
                json.dumps(interpolate_curve())
            `);

            const curve = JSON.parse(curveResult);

            // Plot data points
            const dataTrace = {
                x: maturities,
                y: yields,
                mode: 'markers',
                name: 'Input Data',
                marker: {
                    size: 10,
                    color: '#667eea',
                    line: { color: 'white', width: 2 }
                },
                hovertemplate: '<b>%{x:.2f} years</b><br>Yield: %{y:.2f}%<extra></extra>'
            };

            // Safe zone curve
            const safeIndices = curve.dense_maturities.map((t, i) =>
                t >= curve.min_maturity && t <= curve.max_maturity ? i : null
            ).filter(i => i !== null);

            const curveTrace = {
                x: safeIndices.map(i => curve.dense_maturities[i]),
                y: safeIndices.map(i => curve.interpolated_yields[i]),
                mode: 'lines',
                name: 'Cubic Spline',
                line: { color: '#764ba2', width: 3 },
                hovertemplate: '<b>%{x:.2f} years</b><br>Yield: %{y:.2f}%<extra></extra>'
            };

            // Extrapolation zone
            const extrapolIndices = curve.dense_maturities.map((t, i) =>
                t < curve.min_maturity || t > curve.max_maturity ? i : null
            ).filter(i => i !== null);

            let traces = [dataTrace, curveTrace];

            if (extrapolIndices.length > 0) {
                traces.push({
                    x: extrapolIndices.map(i => curve.dense_maturities[i]),
                    y: extrapolIndices.map(i => curve.interpolated_yields[i]),
                    mode: 'lines',
                    name: 'Extrapolation',
                    line: { color: '#ffc107', width: 3, dash: 'dash' },
                    hovertemplate: '<b>%{x:.2f} years</b><br>Yield: %{y:.2f}% (extrapolated)<extra></extra>'
                });
            }

            Plotly.newPlot('plot', traces, {
                title: 'Yield Curve',
                xaxis: { title: 'Maturity (years)', gridcolor: '#e0e0e0' },
                yaxis: { title: 'Yield (%)', gridcolor: '#e0e0e0' },
                hovermode: 'closest',
                plot_bgcolor: '#fafafa',
                paper_bgcolor: 'white',
                margin: { l: 70, r: 40, t: 60, b: 60 }
            }, { responsive: true });
        }


        initializePyodide().catch(err => {
            document.getElementById('loading').innerHTML = `<p style="color: red;">Error: ${err.message}</p>`;
        });
    </script>
</body>
</html>
